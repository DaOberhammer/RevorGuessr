<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 14px;
      font-family: "Share Tech Mono", Consolas, monospace;
      background: linear-gradient(165deg, #12082a, #07070f);
      color: #d8f7ff;
      border: 1px solid rgba(0, 245, 255, 0.25);
    }
    h1 {
      font-family: "Orbitron", sans-serif;
      font-size: 13px;
      color: #00f5ff;
      letter-spacing: 0.12em;
      text-shadow: 0 0 8px rgba(0, 245, 255, 0.5);
    }
    .sub {
      font-size: 9px;
      color: #ff2bd6;
      letter-spacing: 0.2em;
      margin-top: 2px;
    }
    p {
      font-size: 11px;
      color: rgba(155, 232, 255, 0.75);
      margin: 12px 0;
      line-height: 1.45;
    }
    a.coffee {
      display: block;
      text-align: center;
      padding: 10px 12px;
      font-family: "Orbitron", sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: #fcee0a;
      background: rgba(252, 238, 10, 0.08);
      border: 1px solid rgba(252, 238, 10, 0.45);
      border-radius: 3px;
      box-shadow: 0 0 12px rgba(252, 238, 10, 0.15);
    }
    a.coffee:hover {
      background: rgba(252, 238, 10, 0.16);
      box-shadow: 0 0 18px rgba(252, 238, 10, 0.35);
    }
    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: rgba(110, 166, 187, 0.9);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>// GEO_SIGNAL</h1>
  <div class="sub">BY REVOR</div>
  <p>Cyberpunk location overlay for GeoGuessr. Open a game round and the panel appears automatically.</p>
  <a class="coffee" href="https://buymeacoffee.com/revor" target="_blank" rel="noopener">☕ BUY REVOR A COFFEE</a>
  <div class="hint">100% free. If it helps you learn or win a few rounds, consider supporting development.</div>
</body>
</html>
